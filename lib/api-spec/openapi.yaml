openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: ISM Tecnologia Financial System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: dashboard
    description: Dashboard KPIs and charts
  - name: lancamentos
    description: Financial entries
  - name: parceiros
    description: Partners (clients, suppliers, etc.)
  - name: contas-bancarias
    description: Bank accounts
  - name: plano-contas
    description: Chart of accounts
  - name: metas
    description: Financial goals/targets
  - name: conciliacao
    description: Bank reconciliation
  - name: kanban
    description: Kanban board
  - name: relatorios
    description: Reports
  - name: usuarios
    description: Users
  - name: filiais
    description: Branches
  - name: tokens-api
    description: API tokens
  - name: departamentos
    description: Departments and cost centers
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /dashboard/kpis:
    get:
      operationId: getDashboardKpis
      tags: [dashboard]
      summary: Get dashboard KPI cards
      responses:
        "200":
          description: KPI data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardKpis"

  /dashboard/projecao-mes:
    get:
      operationId: getDashboardProjecaoMes
      tags: [dashboard]
      summary: Current month projection
      responses:
        "200":
          description: Projecao do mes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjecaoMes"

  /dashboard/projecao-dias:
    get:
      operationId: getDashboardProjecaoDias
      tags: [dashboard]
      parameters:
        - name: dias
          in: query
          schema:
            type: integer
            enum: [15, 30, 60]
            default: 30
      summary: Cash flow projection for next N days
      responses:
        "200":
          description: Projection data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjecaoDiaItem"

  /dashboard/inadimplencia-clientes:
    get:
      operationId: getDashboardInadimplenciaClientes
      tags: [dashboard]
      parameters:
        - name: tab
          in: query
          schema:
            type: string
            enum: [inadimplente, proximos_vencer, vencidos]
            default: inadimplente
      responses:
        "200":
          description: Client overdue data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InadimplenciaItem"

  /dashboard/inadimplencia-fornecedores:
    get:
      operationId: getDashboardInadimplenciaFornecedores
      tags: [dashboard]
      parameters:
        - name: tab
          in: query
          schema:
            type: string
            enum: [inadimplente, proximos_vencer, vencidos]
            default: inadimplente
      responses:
        "200":
          description: Supplier overdue data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InadimplenciaItem"

  /dashboard/dias-atraso:
    get:
      operationId: getDashboardDiasAtraso
      tags: [dashboard]
      responses:
        "200":
          description: Days overdue chart data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DiasAtrasoItem"

  /dashboard/nivel-risco:
    get:
      operationId: getDashboardNivelRisco
      tags: [dashboard]
      responses:
        "200":
          description: Risk level data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NivelRiscoItem"

  /dashboard/fluxo-caixa-mensal:
    get:
      operationId: getDashboardFluxoCaixaMensal
      tags: [dashboard]
      parameters:
        - name: ano
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Monthly cash flow bar chart data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FluxoCaixaMensalItem"

  /dashboard/saidas-plano-contas:
    get:
      operationId: getDashboardSaidasPlanoContas
      tags: [dashboard]
      responses:
        "200":
          description: Expenses by account plan
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PlanoContaDonutItem"

  /dashboard/entradas-plano-contas:
    get:
      operationId: getDashboardEntradasPlanoContas
      tags: [dashboard]
      responses:
        "200":
          description: Revenue by account plan
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PlanoContaDonutItem"

  /lancamentos:
    get:
      operationId: getLancamentos
      tags: [lancamentos]
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: tipo
          in: query
          schema:
            type: string
            enum: [CP, CR]
        - name: status
          in: query
          schema:
            type: string
            enum: [pendente, pago, recebido, atrasado, cancelado]
        - name: conta_id
          in: query
          schema:
            type: integer
        - name: parceiro_id
          in: query
          schema:
            type: integer
        - name: data_inicio
          in: query
          schema:
            type: string
            format: date
        - name: data_fim
          in: query
          schema:
            type: string
            format: date
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of lancamentos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LancamentoListResponse"
    post:
      operationId: createLancamento
      tags: [lancamentos]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLancamento"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lancamento"

  /lancamentos/{id}:
    get:
      operationId: getLancamento
      tags: [lancamentos]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Single lancamento
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lancamento"
    put:
      operationId: updateLancamento
      tags: [lancamentos]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLancamento"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lancamento"
    delete:
      operationId: deleteLancamento
      tags: [lancamentos]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /parceiros:
    get:
      operationId: getParceiros
      tags: [parceiros]
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: search
          in: query
          schema:
            type: string
        - name: tipo
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of parceiros
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParceirosListResponse"
    post:
      operationId: createParceiro
      tags: [parceiros]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateParceiro"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Parceiro"

  /parceiros/{id}:
    get:
      operationId: getParceiro
      tags: [parceiros]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Single parceiro
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Parceiro"
    put:
      operationId: updateParceiro
      tags: [parceiros]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateParceiro"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Parceiro"
    delete:
      operationId: deleteParceiro
      tags: [parceiros]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /contas-bancarias:
    get:
      operationId: getContasBancarias
      tags: [contas-bancarias]
      parameters:
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of bank accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContaBancaria"
    post:
      operationId: createContaBancaria
      tags: [contas-bancarias]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateContaBancaria"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContaBancaria"

  /contas-bancarias/{id}:
    put:
      operationId: updateContaBancaria
      tags: [contas-bancarias]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateContaBancaria"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContaBancaria"
    delete:
      operationId: deleteContaBancaria
      tags: [contas-bancarias]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /plano-contas:
    get:
      operationId: getPlanoContas
      tags: [plano-contas]
      responses:
        "200":
          description: Chart of accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PlanoContaItem"
    post:
      operationId: createPlanoContaItem
      tags: [plano-contas]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePlanoContaItem"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanoContaItem"

  /plano-contas/{id}:
    put:
      operationId: updatePlanoContaItem
      tags: [plano-contas]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePlanoContaItem"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanoContaItem"
    delete:
      operationId: deletePlanoContaItem
      tags: [plano-contas]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /metas:
    get:
      operationId: getMetas
      tags: [metas]
      parameters:
        - name: ano
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Goals for the year
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Meta"
    post:
      operationId: saveMeta
      tags: [metas]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveMeta"
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Meta"

  /conciliacoes:
    get:
      operationId: getConciliacoes
      tags: [conciliacao]
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: status
          in: query
          schema:
            type: string
            enum: [pendente, conciliado]
        - name: conta_id
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of reconciliations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConciliacaoListResponse"

  /conciliacoes/importar:
    post:
      operationId: importarConciliacao
      tags: [conciliacao]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                conta_id:
                  type: integer
                arquivo:
                  type: string
                  format: binary
      responses:
        "201":
          description: Imported
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conciliacao"

  /conciliacoes/{id}:
    get:
      operationId: getConciliacao
      tags: [conciliacao]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Reconciliation detail with items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConciliacaoDetail"
    delete:
      operationId: deleteConciliacao
      tags: [conciliacao]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /conciliacoes/{id}/conciliar:
    post:
      operationId: conciliar
      tags: [conciliacao]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Reconciled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conciliacao"

  /conciliacoes/{id}/itens/{itemId}/ignorar:
    post:
      operationId: ignorarItemConciliacao
      tags: [conciliacao]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Item ignored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemConciliacao"

  /conciliacoes/{id}/itens/{itemId}/vincular:
    post:
      operationId: vincularItemConciliacao
      tags: [conciliacao]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VincularItemConciliacao"
      responses:
        "200":
          description: Linked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemConciliacao"

  /kanban/cards:
    get:
      operationId: getKanbanCards
      tags: [kanban]
      responses:
        "200":
          description: All kanban cards
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KanbanCard"
    post:
      operationId: createKanbanCard
      tags: [kanban]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateKanbanCard"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KanbanCard"

  /kanban/cards/{id}:
    put:
      operationId: updateKanbanCard
      tags: [kanban]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateKanbanCard"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KanbanCard"
    delete:
      operationId: deleteKanbanCard
      tags: [kanban]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /relatorios/fechamento-mensal:
    get:
      operationId: getRelatorioFechamentoMensal
      tags: [relatorios]
      parameters:
        - name: mes
          in: query
          required: true
          schema:
            type: integer
        - name: ano
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Monthly closing report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FechamentoMensalReport"

  /relatorios/dre:
    get:
      operationId: getRelatorioDre
      tags: [relatorios]
      parameters:
        - name: ano
          in: query
          required: true
          schema:
            type: integer
        - name: regime
          in: query
          schema:
            type: string
            enum: [competencia, caixa]
            default: competencia
      responses:
        "200":
          description: DRE report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DreReport"

  /relatorios/fluxo-caixa:
    get:
      operationId: getRelatorioFluxoCaixa
      tags: [relatorios]
      parameters:
        - name: ano
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Cash flow report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FluxoCaixaReport"

  /relatorios/metas:
    get:
      operationId: getRelatorioMetas
      tags: [relatorios]
      parameters:
        - name: ano
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Goals vs actual report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetasReport"

  /relatorios/contabil-fiscal:
    get:
      operationId: getRelatorioContabilFiscal
      tags: [relatorios]
      parameters:
        - name: data_inicio
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: data_fim
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: filial_id
          in: query
          schema:
            type: integer
        - name: conta_id
          in: query
          schema:
            type: integer
        - name: tipo
          in: query
          schema:
            type: string
            enum: [CP, CR, ambos]
            default: ambos
      responses:
        "200":
          description: Accounting/fiscal report
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContabilFiscalItem"

  /usuarios:
    get:
      operationId: getUsuarios
      tags: [usuarios]
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsuariosListResponse"
    post:
      operationId: createUsuario
      tags: [usuarios]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUsuario"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Usuario"

  /usuarios/{id}:
    put:
      operationId: updateUsuario
      tags: [usuarios]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUsuario"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Usuario"

  /usuarios/{id}/permissoes:
    get:
      operationId: getUsuarioPermissoes
      tags: [usuarios]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User permissions
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
    put:
      operationId: updateUsuarioPermissoes
      tags: [usuarios]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                permissoes:
                  type: array
                  items:
                    type: string
              required:
                - permissoes
      responses:
        "200":
          description: Updated permissions
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  /filiais:
    get:
      operationId: getFiliais
      tags: [filiais]
      responses:
        "200":
          description: List of branches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Filial"
    post:
      operationId: createFilial
      tags: [filiais]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFilial"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Filial"

  /filiais/{id}:
    put:
      operationId: updateFilial
      tags: [filiais]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
